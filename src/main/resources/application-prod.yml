spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=Africa/Douala
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 60000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AZURE_AD_ISSUER_URI}
      client:
        registration:
          azure:
            client-id: ${AZURE_AD_CLIENT_ID}
            client-secret: ${AZURE_AD_CLIENT_SECRET}
            scope: openid, profile, email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/azure"
        provider:
          azure:
            issuer-uri: ${AZURE_AD_ISSUER_URI}
            user-name-attribute: sub

logging:
  level:
    root: WARN
    com.camtech: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      cloudwatch:
        namespace: DigitransCM-Prod
        enabled: true
        batch-size: 20
      azuremonitor:
        enabled: true
    tags:
      environment: prod
      project: digitrans-cm
