spring:
  datasource:
    url: jdbc:mysql://localhost:3306/digitrans_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Douala
    username: root
    password: root

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AZURE_AD_ISSUER_URI:http://localhost:8081/api/v1}

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration

logging:
  level:
    com.camtech: DEBUG
    org.hibernate.SQL: DEBUG

management:
  health:
    redis:
      enabled: false
  metrics:
    export:
      cloudwatch:
        enabled: false
      azuremonitor:
        enabled: false
