name: CI/CD Pipeline - Build and Deploy

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: af-south-1
  ECR_REGISTRY_NAME: digitrans-cm

jobs:
  # Job 1: Build et Test
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run Unit Tests
        run: mvn test

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: maven-artifacts
          path: "**/target/*.jar"
          retention-days: 5

  # Job 2: Code Quality Analysis avec SonarCloud
  sonarcloud:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Job 3: Build Docker Images et Push to ECR
  build-docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, Tag, and Push Docker Image - ERP Service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f erp-service/Dockerfile -t $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/erp-service:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/erp-service:$IMAGE_TAG
          docker tag $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/erp-service:$IMAGE_TAG $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/erp-service:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/erp-service:latest

      - name: Build, Tag, and Push Docker Image - Supply Chain Service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f supply-chain-service/Dockerfile -t $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/supply-chain-service:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/supply-chain-service:$IMAGE_TAG
          docker tag $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/supply-chain-service:$IMAGE_TAG $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/supply-chain-service:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/supply-chain-service:latest

      - name: Build, Tag, and Push Docker Image - Auth Service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f auth-service/Dockerfile -t $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/auth-service:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/auth-service:$IMAGE_TAG
          docker tag $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/auth-service:$IMAGE_TAG $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/auth-service:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REGISTRY_NAME }}/auth-service:latest

      # API Gateway has been removed from this repository

  # Job 4: Deploy to ECS (Production)
  deploy:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS Services
        run: |
          aws ecs update-service --cluster digitrans-cm-cluster --service digitrans-cm-erp-service --force-new-deployment --region ${{ env.AWS_REGION }}
          aws ecs update-service --cluster digitrans-cm-cluster --service digitrans-cm-supply-chain-service --force-new-deployment --region ${{ env.AWS_REGION }}
          aws ecs update-service --cluster digitrans-cm-cluster --service digitrans-cm-auth-service --force-new-deployment --region ${{ env.AWS_REGION }}
          # API Gateway service removed from ECS updates

      - name: Wait for ECS Service Update
        run: |
          aws ecs wait services-stable --cluster digitrans-cm-cluster --services digitrans-cm-erp-service digitrans-cm-supply-chain-service digitrans-cm-auth-service --region ${{ env.AWS_REGION }}

  # Job 5: Notifications
  notify:
    runs-on: ubuntu-latest
    needs: [build, sonarcloud, build-docker, deploy]
    if: always()
    steps:
      - name: Notify Slack on Success
        if: ${{ needs.build.result == 'success' && needs.sonarcloud.result == 'success' && needs.build-docker.result == 'success' }}
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "DIGITRANS-CM Pipeline - Build & Deploy Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Build Status:* Success\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref }}"
                  }
                }
              ]
            }

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "DIGITRANS-CM Pipeline - Build Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Build Status:* Failed\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref }}"
                  }
                }
              ]
            }
