apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-deployment
  labels:
    app: erp-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: erp-service
  template:
    metadata:
      labels:
        app: erp-service
    spec:
      containers:
        - name: erp-service
          image: ${ERP_IMAGE:-"yvezzz/erp-service:latest"}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: digitrans-config
            - secretRef:
                name: digitrans-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
