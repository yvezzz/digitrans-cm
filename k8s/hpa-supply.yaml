apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: supply-hpa
  labels:
    app: supply-chain-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: supply-deployment
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
