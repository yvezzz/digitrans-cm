apiVersion: apps/v1
kind: Deployment
metadata:
  name: supply-deployment
  labels:
    app: supply-chain-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: supply-chain-service
  template:
    metadata:
      labels:
        app: supply-chain-service
    spec:
      containers:
        - name: supply-chain-service
          image: ${SUPPLY_IMAGE:-"yvezzz/supply-chain-service:latest"}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
              name: http
          envFrom:
            - configMapRef:
                name: digitrans-config
            - secretRef:
                name: digitrans-secrets
          resources:
            requests:
              cpu: "300m"
              memory: "256Mi"
            limits:
              cpu: "600m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/actuator/health
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/actuator/health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
