apiVersion: apps/v1
kind: Deployment
metadata:
  name: digitrans-app
  labels:
    app: digitrans-cm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: digitrans-cm
  template:
    metadata:
      labels:
        app: digitrans-cm
    spec:
      containers:
        - name: app
          image: yvezzz/digitrans-cm:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: digitrans-config
            - secretRef:
                name: digitrans-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
